  try {

      return {
        groups: data.groups || defaultGroups,
        presets: data.presets || defaultPresets,
        projectInfo: data.projectInfo || {
          name: '',
          startDate: '',
          endDate: '',
          location: ''

    }
  } catch (e) {}
  return {

  const d = new Date(iso);
